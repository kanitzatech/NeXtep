# =============================================
# PathWise Backend - Application Configuration
# =============================================

spring.application.name=pathwise-backend

# ---- PostgreSQL DataSource ----
# Cloud Run/production should provide DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD.
# SSL remains enabled via sslmode=require.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:college_db}?sslmode=${DB_SSLMODE:prefer}}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- Connection Pool (IMPORTANT for high concurrent users) ----
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:40}
spring.datasource.hikari.minimum-idle=${DB_POOL_MIN:10}
spring.datasource.hikari.idle-timeout=${DB_POOL_IDLE_TIMEOUT_MS:30000}
spring.datasource.hikari.connection-timeout=${DB_POOL_CONNECTION_TIMEOUT_MS:10000}
spring.datasource.hikari.max-lifetime=${DB_POOL_MAX_LIFETIME_MS:1800000}

# ---- JPA / Hibernate ----
# Use 'update' for automatic creation in DEV, 'validate' for PRODUCTION safe check
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# ---- Naming Strategy (Ensures snake_case in Database) ----
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy

# ---- SQL Initialization (schema.sql) ----
# Set to 'always' to run schema.sql on every startup
spring.sql.init.mode=never

# ---- Server ----
server.port=${PORT:8080}
server.address=0.0.0.0

# ---- Jackson (JSON) ----
spring.jackson.property-naming-strategy=SNAKE_CASE

# ---- Logging (SQL + Parameters) ----
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.com.pathwise=DEBUG